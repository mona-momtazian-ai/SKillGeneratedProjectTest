<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="گالری دیجیتال آثار تاریخی و باستانی ایران — نگاهی به شکوه تمدن چندهزارساله">
  <title>گالری آثار باستانی ایران</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=IM+Fell+English:ital@1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #06080f;
      --sf1:     #0b0d1c;
      --sf2:     #111425;
      --card-bg: #0e1020;

      --saffron: #c8921e;
      --firuze:  #1f8878;
      --ruby:    #8c1a1a;
      --cream:   #f0e4c8;

      --gold:    #c8921e;
      --jade:    #1f8878;
      --lapis:   #2e5498;

      --b0: rgba(200,146,30,0.07);
      --b1: rgba(200,146,30,0.18);
      --b2: rgba(200,146,30,0.48);

      --tx:  #e0d4b4;
      --tx2: #7a7060;
      --tx3: #3e3828;

      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Vazirmatn', Tahoma, 'Arial Unicode MS', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .site-header {
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse 140% 80% at 50% 0%, rgba(31,136,120,0.07) 0%, transparent 60%);
    }

    /* Top ornamental line */
    .site-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent 0%, var(--saffron) 30%, var(--firuze) 50%, var(--saffron) 70%, transparent 100%);
      opacity: 0.6;
    }

    /* Shamseh watermark */
    .shamseh-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }
    .shamseh-svg {
      width: 560px;
      height: 560px;
      flex-shrink: 0;
      animation: shamseh-turn 240s linear infinite;
    }
    @keyframes shamseh-turn { to { transform: rotate(360deg); } }

    .header-inner {
      position: relative;
      z-index: 1;
      padding: 5.5rem 2rem 4.5rem;
      text-align: center;
      max-width: 860px;
      margin: 0 auto;
    }

    .header-eras {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0 0.4rem;
      margin-bottom: 2.8rem;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.26em;
      color: var(--tx2);
      text-transform: uppercase;
      animation: fadeUp 0.8s var(--ease) both;
    }
    .era-dot { color: var(--saffron); opacity: 0.45; }

    .site-title {
      margin-bottom: 0.9rem;
      animation: fadeUp 0.85s var(--ease) 0.1s both;
    }
    .title-fa {
      display: block;
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      background: linear-gradient(160deg, var(--cream) 0%, var(--saffron) 55%, rgba(200,146,30,0.72) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-tagline {
      font-size: 0.88rem;
      color: var(--tx2);
      font-weight: 300;
      letter-spacing: 0.04em;
      animation: fadeUp 0.85s var(--ease) 0.22s both;
    }

    .header-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--b0);
      animation: fadeUp 0.85s var(--ease) 0.32s both;
    }
    .stat { text-align: center; }
    .stat-num {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.65rem;
      font-weight: 500;
      color: var(--saffron);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-label {
      display: block;
      font-size: 0.62rem;
      color: var(--tx2);
      margin-top: 0.3rem;
      letter-spacing: 0.04em;
    }
    .stat-sep { width: 1px; height: 36px; background: var(--b1); flex-shrink: 0; }

    /* ── Cypress (سرو) divider ── */
    .site-divider { position: relative; height: 64px; overflow: hidden; }

    /* ── Gallery ── */
    #gallery {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 1.5rem 8rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 290px;
      gap: 1.5rem;
    }
    #gallery > .card:first-child { grid-column: span 2; grid-row: span 2; }

    /* ── Card ── */
    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-bg);
      border: 1px solid var(--b0);
      border-radius: 14px;
      outline: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
      transform: translateY(0);
      transition: border-color 0.3s var(--ease), box-shadow 0.4s var(--ease), transform 0.32s var(--ease);
      animation: cardIn 0.55s var(--ease) both;
    }
    .card:hover, .card:focus-visible {
      border-color: var(--b1);
      box-shadow: 0 18px 52px rgba(0,0,0,0.58), 0 6px 18px rgba(0,0,0,0.32);
      transform: translateY(-4px);
    }
    .card:focus-visible { outline: 2px solid var(--firuze); outline-offset: 4px; border-radius: 14px; }

    /* Saffron sweep on hover */
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 2px;
      background: linear-gradient(to left, var(--saffron), var(--firuze));
      z-index: 6;
      transition: width 0.5s var(--ease);
    }
    .card:hover::before, .card:focus-visible::before { width: 72%; }

    /* Turquoise vertical accent stripe */
    .card-accent {
      position: absolute;
      right: 0; top: 35%; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent, var(--firuze), rgba(31,136,120,0.25));
      z-index: 4;
      opacity: 0;
      transition: opacity 0.4s var(--ease);
    }
    .card:hover .card-accent, .card:focus-visible .card-accent { opacity: 1; }

    .card-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.72;
      transition: transform 0.9s var(--ease), opacity 0.5s ease;
    }
    .card:hover .card-img, .card:focus-visible .card-img {
      transform: scale(1.06);
      opacity: 0.93;
    }

    .card-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(6,8,15,0.98) 0%, rgba(6,8,15,0.5) 32%, rgba(6,8,15,0) 62%);
      z-index: 1;
    }

    .card-body {
      position: absolute;
      bottom: 0; right: 0; left: 0;
      padding: 1.2rem 1.25rem 1.25rem;
      z-index: 2;
    }
    .card-era-chip {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      color: var(--firuze);
      border: 1px solid rgba(31,136,120,0.32);
      border-radius: 20px;
      background: rgba(31,136,120,0.08);
      padding: 0.15rem 0.65rem;
      margin-bottom: 0.44rem;
    }
    .card-name {
      font-size: 1.0rem;
      font-weight: 600;
      color: var(--tx);
      line-height: 1.25;
    }
    .card-latin {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.68rem;
      color: var(--firuze);
      opacity: 0.62;
      margin-top: 0.1rem;
      display: block;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-top: 0.3rem;
    }
    .card-place { font-size: 0.64rem; color: var(--tx2); }
    .card-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.52rem;
      color: var(--tx3);
      letter-spacing: 0.06em;
    }

    #gallery > .card:first-child .card-body { padding: 1.75rem 1.65rem 1.4rem; }
    #gallery > .card:first-child .card-name { font-size: 1.65rem; }
    #gallery > .card:first-child .card-latin { font-size: 0.92rem; }
    #gallery > .card:first-child .card-era-chip { font-size: 0.58rem; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Detail view ── */
    #detail { display: none; min-height: 100vh; }
    #detail.active { display: block; animation: fadeIn 0.38s var(--ease) both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-bar {
      position: sticky; top: 0; z-index: 20;
      background: rgba(6,8,15,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--b0);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.75rem;
      gap: 1rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: none;
      border: 1px solid var(--b1);
      color: var(--tx2);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.78rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      border-radius: 1px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-back:hover { border-color: var(--firuze); color: var(--firuze); background: rgba(31,136,120,0.08); }
    .btn-back:focus-visible { outline: 2px solid var(--firuze); outline-offset: 2px; }
    .btn-back svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    .detail-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--tx3);
      letter-spacing: 0.1em;
      user-select: none;
    }

    .detail-hero {
      position: relative;
      height: min(68vh, 620px);
      overflow: hidden;
      background: var(--sf1);
    }
    .detail-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.86; }
    .detail-hero-num {
      position: absolute;
      bottom: 1.25rem; left: 1.75rem;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 7rem;
      line-height: 1;
      color: rgba(200,146,30,0.09);
      user-select: none;
      pointer-events: none;
      z-index: 2;
    }
    .detail-hero-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 65%;
      background: linear-gradient(to bottom, transparent, var(--bg));
      pointer-events: none;
    }

    .detail-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.75rem 7rem;
    }

    .detail-tags {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.13em;
      padding: 0.18rem 0.55rem;
      border: 1px solid;
      line-height: 1.6;
      border-radius: 1px;
    }
    .tag-era      { color: var(--firuze);  border-color: rgba(31,136,120,0.35); }
    .tag-location { color: var(--tx2);     border-color: var(--b0); }
    .tag-date     { color: var(--tx3);     border-color: transparent; }

    .detail-title {
      font-size: clamp(2.2rem, 5.5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--tx);
      margin-bottom: 0.3rem;
    }
    .detail-latin {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--firuze);
      opacity: 0.65;
      display: block;
      margin-bottom: 2.2rem;
    }
    .detail-rule {
      width: 40px; height: 2px;
      background: linear-gradient(to left, var(--saffron), var(--firuze));
      opacity: 0.55;
      margin-bottom: 2.2rem;
    }
    .detail-desc { font-size: 0.97rem; line-height: 2.1; color: var(--tx2); font-weight: 300; }
    .detail-desc p + p { margin-top: 1.1rem; }

    .detail-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4rem;
      padding-top: 1.75rem;
      border-top: 1px solid var(--b0);
    }
    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: none;
      border: 1px solid var(--b0);
      color: var(--tx2);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.78rem;
      padding: 0.48rem 1.05rem;
      cursor: pointer;
      border-radius: 1px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-nav:hover:not(:disabled) { border-color: var(--b2); color: var(--saffron); background: rgba(200,146,30,0.06); }
    .btn-nav:focus-visible { outline: 2px solid var(--firuze); outline-offset: 2px; }
    .btn-nav:disabled { opacity: 0.18; cursor: not-allowed; }
    .btn-nav svg { width: 14px; height: 14px; fill: currentColor; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--b1); border-radius: 2px; }

    @media (max-width: 1024px) {
      #gallery { grid-template-columns: repeat(2,1fr); grid-auto-rows: 250px; gap: 1.25rem; }
      #gallery > .card:first-child { grid-column: span 2; grid-row: span 1; }
    }
    @media (max-width: 640px) {
      .header-inner { padding: 3.5rem 1.25rem 3rem; }
      .header-stats { gap: 1.25rem; }
      .stat-sep { height: 28px; }
      .shamseh-svg { width: 340px; height: 340px; }
      #gallery { grid-template-columns: repeat(2,1fr); grid-auto-rows: 180px; padding: 2rem 0.75rem 5rem; gap: 0.75rem; }
      #gallery > .card:first-child { grid-column: span 2; grid-row: span 1; }
      #gallery > .card:first-child .card-body { padding: 1.1rem 1.1rem 0.9rem; }
      #gallery > .card:first-child .card-name { font-size: 1.1rem; }
      #gallery > .card:first-child .card-latin { font-size: 0.72rem; }
      .detail-hero { height: min(45vh, 300px); }
      .detail-hero-num { font-size: 4rem; }
      .detail-content { padding: 2rem 1.25rem 5rem; }
      .detail-bar { padding: 0.75rem 1.25rem; }
    }
    @media (max-width: 400px) {
      #gallery { grid-template-columns: 1fr; grid-auto-rows: auto; }
      .card { aspect-ratio: 4/3; }
      #gallery > .card:first-child { grid-column: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .card, #detail.active, .title-fa, .site-title,
      .header-tagline, .header-stats, .header-eras { animation: none; }
      .card-img { transition: opacity 0.3s ease; }
      .card:hover .card-img { transform: none; }
      .card:hover, .card:focus-visible { transform: none; }
      .shamseh-svg { animation: none; }
    }
  </style>
</head>
<body>

<header class="site-header">

  <!-- Shamseh (شمسه) — Persian illuminated-manuscript medallion -->
  <div class="shamseh-wrap" aria-hidden="true">
    <svg class="shamseh-svg" viewBox="-210 -210 420 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <polygon id="sh-p" points="0,-20 -22,-90 0,-175 22,-90"/>
      </defs>
      <!-- 12 petals at 30° increments -->
      <g fill="rgba(200,146,30,0.10)" stroke="rgba(200,146,30,0.30)" stroke-width="0.8" stroke-linejoin="round">
        <use href="#sh-p" transform="rotate(0)"/>
        <use href="#sh-p" transform="rotate(30)"/>
        <use href="#sh-p" transform="rotate(60)"/>
        <use href="#sh-p" transform="rotate(90)"/>
        <use href="#sh-p" transform="rotate(120)"/>
        <use href="#sh-p" transform="rotate(150)"/>
        <use href="#sh-p" transform="rotate(180)"/>
        <use href="#sh-p" transform="rotate(210)"/>
        <use href="#sh-p" transform="rotate(240)"/>
        <use href="#sh-p" transform="rotate(270)"/>
        <use href="#sh-p" transform="rotate(300)"/>
        <use href="#sh-p" transform="rotate(330)"/>
      </g>
      <!-- Inner medallion rings -->
      <circle r="20"  fill="rgba(200,146,30,0.07)" stroke="rgba(200,146,30,0.38)" stroke-width="0.8"/>
      <circle r="92"  fill="none" stroke="rgba(200,146,30,0.12)" stroke-width="0.6" stroke-dasharray="4 3"/>
      <circle r="175" fill="none" stroke="rgba(200,146,30,0.20)" stroke-width="0.8"/>
      <circle r="197" fill="none" stroke="rgba(200,146,30,0.10)" stroke-width="0.6"/>
      <!-- 12 small diamonds in the mid ring -->
      <g fill="rgba(200,146,30,0.08)" stroke="rgba(200,146,30,0.22)" stroke-width="0.6">
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(0)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(30)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(60)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(90)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(120)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(150)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(180)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(210)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(240)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(270)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(300)"/>
        <polygon points="0,-88 -5,-92 0,-98 5,-92" transform="rotate(330)"/>
      </g>
    </svg>
  </div>

  <div class="header-inner">
    <div class="header-eras" aria-label="دوره‌های تاریخی نمایش‌داده‌شده">
      <span>ایلامی</span>
      <span class="era-dot" aria-hidden="true">·</span>
      <span>هخامنشی</span>
      <span class="era-dot" aria-hidden="true">·</span>
      <span>ساسانی</span>
      <span class="era-dot" aria-hidden="true">·</span>
      <span>زیاری</span>
      <span class="era-dot" aria-hidden="true">·</span>
      <span>صفوی</span>
      <span class="era-dot" aria-hidden="true">·</span>
      <span>قاجار</span>
    </div>

    <h1 class="site-title">
      <span class="title-fa">گالری آثار باستانی ایران</span>
    </h1>
    <p class="header-tagline">نگاهی به شکوه تمدن چندهزارساله</p>

    <div class="header-stats" role="list" aria-label="آمار مجموعه">
      <div class="stat" role="listitem">
        <span class="stat-num">۱۲</span>
        <span class="stat-label">اثر تاریخی</span>
      </div>
      <div class="stat-sep" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat-num">۸</span>
        <span class="stat-label">میراث جهانی یونسکو</span>
      </div>
      <div class="stat-sep" aria-hidden="true"></div>
      <div class="stat" role="listitem">
        <span class="stat-num">۳۲۰۰</span>
        <span class="stat-label">سال تاریخ</span>
      </div>
    </div>
  </div>

  <!-- Iranian Cypress (سرو) repeating divider -->
  <div class="site-divider" aria-hidden="true">
    <svg viewBox="0 0 1440 64" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="cypress-p" x="0" y="0" width="28" height="64" patternUnits="userSpaceOnUse">
          <rect width="28" height="64" fill="rgba(200,146,30,0.09)"/>
          <!-- سرو ایرانی — Persian cypress silhouette -->
          <path d="M14,4 C9,14 6,26 6,36 C6,46 9,53 11,58 L11,62 L17,62 L17,58 C19,53 22,46 22,36 C22,26 19,14 14,4 Z"
                fill="rgba(200,146,30,0.38)" stroke="rgba(200,146,30,0.68)" stroke-width="0.7" stroke-linejoin="round"/>
          <!-- Vein -->
          <line x1="14" y1="7" x2="14" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <!-- Diamond ornament between trees (half at x=0, half at x=28, joins when tiled) -->
          <polygon points="0,29 -3.5,32 0,35 3.5,32" fill="rgba(200,146,30,0.55)" stroke="rgba(200,146,30,0.75)" stroke-width="0.4"/>
        </pattern>
      </defs>
      <line x1="0" y1="0.5" x2="1440" y2="0.5" stroke="rgba(200,150,30,0.45)" stroke-width="1"/>
      <rect x="0" y="0" width="1440" height="64" fill="url(#cypress-p)"/>
      <line x1="0" y1="63.5" x2="1440" y2="63.5" stroke="rgba(200,150,30,0.22)" stroke-width="1"/>
    </svg>
  </div>
</header>

<main id="gallery" role="main" aria-label="فهرست آثار تاریخی ایران"></main>

<section id="detail" role="region" aria-label="جزئیات اثر" aria-hidden="true">

  <nav class="detail-bar" aria-label="ناوبری">
    <button class="btn-back" id="btn-back" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      بازگشت به گالری
    </button>
    <span class="detail-count" id="detail-count" aria-live="polite"></span>
  </nav>

  <figure class="detail-hero" aria-hidden="true">
    <img id="d-img" class="detail-hero-img" src="" alt="" loading="lazy">
    <div class="detail-hero-num" id="d-num" aria-hidden="true"></div>
    <div class="detail-hero-fade"></div>
  </figure>

  <div class="detail-content">
    <div class="detail-tags" aria-label="دسته‌بندی">
      <span class="tag tag-era"      id="d-period"></span>
      <span class="tag tag-location" id="d-location"></span>
      <span class="tag tag-date"     id="d-date"></span>
    </div>
    <h2 class="detail-title" id="d-title"></h2>
    <span class="detail-latin" id="d-latin" aria-label="نام لاتین"></span>
    <div class="detail-rule" aria-hidden="true"></div>
    <div class="detail-desc" id="d-desc"></div>

    <div class="detail-nav">
      <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" aria-label="اثر قبلی">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        قبلی
      </button>
      <button class="btn-nav" id="btn-next" onclick="navigate(1)" aria-label="اثر بعدی">
        بعدی
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>
  </div>
</section>

<script>
const MONUMENTS = [
  {
    name:"تخت جمشید", latin:"Persepolis", period:"هخامنشی",
    location:"مرودشت، فارس", date:"c. 520–330 BCE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Persepolis_stairs_of_the_Apadana_relief.jpg/1280px-Persepolis_stairs_of_the_Apadana_relief.jpg",
    desc:`تخت جمشید، پایتخت تشریفاتی امپراتوری هخامنشی، از بزرگ‌ترین مجموعه‌های معماری باستانی جهان است. داریوش اول ساخت آن را در حدود ۵۲۰ پیش از میلاد آغاز کرد و جانشینانش خشایارشا و اردشیر اول آن را به اتمام رساندند.

کاخ‌های آپادانا، صد ستون و تچر با نقش‌برجسته‌هایی که هیئت‌های نمایندگی ملل گوناگون را در حال تقدیم هدیه نشان می‌دهند، از ارزشمندترین منابع تصویری تاریخ هنر ایران باستانند. یونسکو تخت جمشید را در ۱۹۷۹ در فهرست میراث جهانی ثبت کرد.`
  },
  {
    name:"میدان نقش جهان", latin:"Naqsh-e Jahan Square", period:"صفوی",
    location:"اصفهان", date:"c. 1598–1629 CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Naqsh-i_Jahan_Square%2C_Jan._2018.jpg/1280px-Naqsh-i_Jahan_Square%2C_Jan._2018.jpg",
    desc:`میدان نقش جهان که امروز به نام میدان امام شناخته می‌شود، بزرگ‌ترین میدان شهری قرون وسطا در جهان به شمار می‌رود. شاه عباس اول صفوی آن را در دوران اوج شکوه پایتختش اصفهان بنا نهاد.

در چهار سوی این میدان چهار بنای اعجاب‌انگیز جای گرفته‌اند: مسجد امام با گنبد فیروزه‌ای رنگش، مسجد شیخ لطف‌الله با کاشی‌کاری بی‌نظیر، عالی‌قاپو با ایوان ستوندارش، و قیصریه که دروازه بازار سرپوشیده است. یونسکو این مجموعه را در ۱۹۷۹ به ثبت رساند.`
  },
  {
    name:"مسجد شیخ لطف‌الله", latin:"Sheikh Lotfollah Mosque", period:"صفوی",
    location:"اصفهان", date:"1602–1619 CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Sheikh_Lotfallah_Esfahan.JPG/1280px-Sheikh_Lotfallah_Esfahan.JPG",
    desc:`مسجد شیخ لطف‌الله در ضلع شرقی میدان نقش جهان، به گستردگی به عنوان شاهکار معماری اسلامی جهان شناخته می‌شود. شاه عباس اول آن را برای حرم سلطنتی و به نام پدرزنش بنا نهاد.

ویژگی منحصر به فرد این مسجد نداشتن گلدسته و صحن است؛ از طریق تونلی زیرزمینی به کاخ عالی‌قاپو متصل بود. گنبد کِرِمی رنگ آن که در طول روز سایه‌های متفاوتی می‌گیرد، و نقوش آفتابی درون آن، این مسجد را به تجربه‌ای فراموش‌نشدنی بدل کرده‌اند.`
  },
  {
    name:"مسجد نصیرالملک", latin:"Nasir ol Molk Mosque", period:"قاجار",
    location:"شیراز، فارس", date:"1876–1888 CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Nasir_ol_Molk_Mosque_%2831233739431%29.jpg/1280px-Nasir_ol_Molk_Mosque_%2831233739431%29.jpg",
    desc:`مسجد نصیرالملک که به «مسجد صورتی» شهرت یافته، یکی از خیره‌کننده‌ترین نمونه‌های معماری قاجاری است. پنجره‌های شیشه‌ای رنگارنگ آن در ساعات اولیه صبح، شبستان را به بوم نقاشی‌ای از نور بدل می‌کنند.

کاشی‌کاری ظریف، طاق‌های گچ‌بری‌شده و ستون‌های مارپیچ، هر گوشه از این مسجد را به اثری از هنر اسلامی تبدیل کرده‌اند. بنای آن به دستور میرزا حسن‌علی نصیرالملک از بزرگان قاجار آغاز شد.`
  },
  {
    name:"ارگ بم", latin:"Arg-e Bam", period:"اشکانی–قاجار",
    location:"بم، کرمان", date:"3rd c. BCE – 19th c. CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Arge_Bam_Arad_edit.jpg/1280px-Arge_Bam_Arad_edit.jpg",
    desc:`ارگ بم بزرگ‌ترین سازه خشتی جهان و یکی از کهن‌ترین شهرهای پابرجا بر روی زمین بود. این دژ برای قرن‌ها بر سر جاده ابریشم، نقش یک شهر زنده را ایفا می‌کرد.

زلزله ویرانگر دی‌ماه ۱۳۸۲ بخش بزرگی از آن را فرو ریخت. طرح بازسازی گسترده‌ای با همکاری ایران و جامعه بین‌الملل آغاز شد و یونسکو آن را هم‌زمان در فهرست میراث جهانی و فهرست میراث در خطر قرار داد.`
  },
  {
    name:"چغازنبیل", latin:"Chogha Zanbil", period:"ایلامی",
    location:"شوش، خوزستان", date:"c. 1250 BCE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/%D8%B2%DB%8C%DA%AF%D9%88%D8%B1%D8%A7%D8%AA_%DA%86%D8%BA%D8%A7_%D8%B2%D9%86%D8%A8%DB%8C%D9%84.jpg/1280px-%D8%B2%DB%8C%DA%AF%D9%88%D8%B1%D8%A7%D8%AA_%DA%86%D8%BA%D8%A7_%D8%B2%D9%86%D8%A8%DB%8C%D9%84.jpg",
    desc:`چغازنبیل کهن‌ترین زیگورات ایران و نخستین اثری است که در ۱۹۷۹ از این سرزمین در فهرست میراث جهانی یونسکو جای گرفت. اونتاش ناپیریشا، پادشاه ایلام، آن را به منظور ایجاد مرکزی مذهبی برای خدای اینشوشیناک بنا نهاد.

از پنج طبقه اصلی زیگورات، اکنون تنها سه طبقه نخست برجاست. معابد متعددی در پیرامون آن قرار داشتند و دروازه‌هایی از جهات گوناگون به مجموعه دسترسی می‌دادند.`
  },
  {
    name:"آرامگاه کوروش بزرگ", latin:"Tomb of Cyrus", period:"هخامنشی",
    location:"پاسارگاد، فارس", date:"c. 530 BCE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Pasargad_Tomb_Cyrus3.jpg/1280px-Pasargad_Tomb_Cyrus3.jpg",
    desc:`آرامگاه کوروش بزرگ، بنیان‌گذار امپراتوری هخامنشی، در دشت مرغاب پاسارگاد ایستاده است. این سازه ساده اما پرشکوه از بلوک‌های سنگ آهکی سفید ساخته شده و بر شش پله به سبک زیگورات استوار است.

اسکندر مقدونی پس از فتح ایران از این آرامگاه بازدید کرد و آن را گرامی داشت. پاسارگاد به عنوان نخستین پایتخت هخامنشی در ۲۰۰۴ در فهرست میراث جهانی یونسکو ثبت شد.`
  },
  {
    name:"نقش رستم", latin:"Naqsh-e Rostam", period:"هخامنشی–ساسانی",
    location:"مرودشت، فارس", date:"5th c. BCE – 3rd c. CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Naqsh-e_Rustam_necropolis_in_Iran.jpg/1280px-Naqsh-e_Rustam_necropolis_in_Iran.jpg",
    desc:`نقش رستم آرامگاه صخره‌ای چهار تن از شاهان هخامنشی است که به شکل صلیب در دل کوه حسین کنده شده‌اند. در پایین این آرامگاه‌ها، نقش‌برجسته‌های شکوهمند ساسانی چشم را خیره می‌کنند.

مشهورترین تصویر، پیروزی شاپور اول بر والرین، امپراتور روم است که سند تصویری کم‌نظیری از روابط ایران و روم به شمار می‌رود. کعبه زردشت، سازه‌ای مرموز مکعبی‌شکل، در برابر آرامگاه‌ها ایستاده است.`
  },
  {
    name:"برج قابوس", latin:"Gonbad-e Qabus", period:"زیاری",
    location:"گنبدکاووس، گلستان", date:"1006 CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Gonbad-e_Qabus_tower2017.jpg/1280px-Gonbad-e_Qabus_tower2017.jpg",
    desc:`برج قابوس، مقبره شمس‌المعالی قابوس بن وشمگیر، امیر هنرپرور سلسله زیاری، با ارتفاع حدود ۷۲ متر از بلندترین آجرپوشی‌های جهان در عصر خود بود. ده پشتوانه مثلثی‌شکل بدنه آجری آن را در دشت گرگان محکم نگه داشته‌اند.

روایت است که تابوت شیشه‌ای قابوس از سقف آن آویزان بود تا هم آفتاب و هم مهتاب بر آن بتابند. یونسکو این برج را در ۲۰۱۲ در فهرست میراث جهانی ثبت کرد.`
  },
  {
    name:"کاخ گلستان", latin:"Golestan Palace", period:"قاجار",
    location:"تهران", date:"17th–19th c. CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Palais_du_Golestan%2C_T%C3%A9h%C3%A9ran_%285%29.jpg/1280px-Palais_du_Golestan%2C_T%C3%A9h%C3%A9ran_%285%29.jpg",
    desc:`کاخ گلستان قدیمی‌ترین مجموعه تاریخی تهران و مرکز حکومت سلسله قاجار بود. این کاخ آمیزه‌ای بی‌نظیر از هنر ایرانی و تأثیرات اروپایی است که در دوره‌ای طولانی شکل گرفت.

هفده بنای تاریخی از جمله تالار آینه با آینه‌کاری‌های خیره‌کننده‌اش، کاخ شمس‌العماره، عمارت بادگیر و باغ تاریخی این مجموعه را می‌سازند. یونسکو کاخ گلستان را در ۲۰۱۳ در فهرست میراث جهانی ثبت کرد.`
  },
  {
    name:"طاق بستان", latin:"Taq-e Bostan", period:"ساسانی",
    location:"کرمانشاه", date:"4th–7th c. CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/%D8%AA%D8%A7%D9%82%E2%80%8C%D8%A8%D8%B3%D8%AA%D8%A7%D9%86.jpg/1280px-%D8%AA%D8%A7%D9%82%E2%80%8C%D8%A8%D8%B3%D8%AA%D8%A7%D9%86.jpg",
    desc:`طاق بستان مجموعه‌ای از نقش‌برجسته‌های سنگی ساسانی است که در دامنه کوه پراو، کنار چشمه‌ای دائمی در کرمانشاه، حک شده‌اند. این آثار از شاهکارهای هنر ساسانی در خاورمیانه به شمار می‌روند.

بزرگ‌ترین ایوان متعلق به خسرو دوم است و صحنه‌های شکار با فیل و گراز را به شکلی پرجزئیات به تصویر می‌کشد. ایوان کوچک‌تر مراسم تاج‌گذاری اردشیر دوم را نشان می‌دهد.`
  },
  {
    name:"مسجد جامع یزد", latin:"Jameh Mosque of Yazd", period:"ایلخانی–تیموری",
    location:"یزد", date:"12th–15th c. CE",
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Jameh_Mosque_of_Yazd_Iran.jpg/1280px-Jameh_Mosque_of_Yazd_Iran.jpg",
    desc:`مسجد جامع یزد با مناره‌های باشکوه و کاشی‌کاری فیروزه‌ای خود یکی از بلندترین مساجد ایران است. پیشینه آن به قرن دوازدهم برمی‌گردد، اما بخش اعظم ساختار کنونی در دوران ایلخانی و تیموری شکل گرفت.

کتیبه‌های نفیس کوفی، محراب گچ‌بری‌شده و گنبد دوجداره کاشی‌کاری‌شده از دیدنی‌ترین بخش‌های این مسجدند. یزد در ۲۰۱۷ به عنوان یک شهر تاریخی در فهرست میراث جهانی یونسکو جای گرفت.`
  }
];

function toPersian(n) {
  return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}
function toHTML(text) {
  return text.trim().split(/\n\n+/).map(p => `<p>${p.trim()}</p>`).join('');
}

let current = -1, savedScrollY = 0, lastCard = null;

(function build() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = MONUMENTS.map((m, i) => `
    <article
      class="card"
      tabindex="0"
      role="button"
      aria-label="${m.name}، ${m.location}"
      data-index="${i}"
      style="animation-delay:${i * 0.05}s"
    >
      <img class="card-img" src="${m.img}" alt="${m.name}" loading="lazy" onerror="this.style.opacity='0'">
      <div class="card-shade" aria-hidden="true"></div>
      <div class="card-accent" aria-hidden="true"></div>
      <div class="card-body">
        <span class="card-era-chip" aria-hidden="true">${m.period}</span>
        <div class="card-name">${m.name}</div>
        <span class="card-latin">${m.latin}</span>
        <div class="card-footer">
          <span class="card-place">${m.location}</span>
          <span class="card-date">${m.date}</span>
        </div>
      </div>
    </article>
  `).join('');

  gallery.addEventListener('click', e => {
    const card = e.target.closest('[data-index]');
    if (card) { lastCard = card; openDetail(+card.dataset.index); }
  });
  gallery.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('[data-index]');
    if (card) { e.preventDefault(); lastCard = card; openDetail(+card.dataset.index); }
  });
})();

function openDetail(idx) {
  current = idx;
  savedScrollY = window.scrollY;
  const m = MONUMENTS[idx];
  document.getElementById('d-img').src              = m.img;
  document.getElementById('d-img').alt              = m.name;
  document.getElementById('d-num').textContent      = toPersian(idx + 1);
  document.getElementById('d-title').textContent    = m.name;
  document.getElementById('d-latin').textContent    = m.latin;
  document.getElementById('d-period').textContent   = m.period;
  document.getElementById('d-location').textContent = m.location;
  document.getElementById('d-date').textContent     = m.date;
  document.getElementById('detail-count').textContent =
    `${toPersian(idx + 1)} از ${toPersian(MONUMENTS.length)}`;
  document.getElementById('d-desc').innerHTML = toHTML(m.desc);
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === MONUMENTS.length - 1;

  const gallery = document.getElementById('gallery');
  const detail  = document.getElementById('detail');
  gallery.style.display = 'none';
  gallery.setAttribute('aria-hidden', 'true');
  detail.classList.add('active');
  detail.removeAttribute('aria-hidden');
  window.scrollTo({ top: 0, behavior: 'instant' });
  document.getElementById('btn-back').focus();
}

function closeDetail() {
  const gallery = document.getElementById('gallery');
  const detail  = document.getElementById('detail');
  detail.classList.remove('active');
  detail.setAttribute('aria-hidden', 'true');
  gallery.style.display = '';
  gallery.removeAttribute('aria-hidden');
  window.scrollTo({ top: savedScrollY, behavior: 'instant' });
  if (lastCard) lastCard.focus();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < MONUMENTS.length) openDetail(next);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('detail').classList.contains('active')) return;
  if (e.key === 'Escape')     closeDetail();
  if (e.key === 'ArrowLeft')  navigate(1);
  if (e.key === 'ArrowRight') navigate(-1);
});
</script>
</body>
</html>
