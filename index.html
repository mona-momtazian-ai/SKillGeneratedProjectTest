<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="گالری دیجیتال آثار تاریخی و باستانی ایران — نگاهی به شکوه تمدن چندهزارساله">
  <title>گالری آثار باستانی ایران</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      /* Grounds — midnight indigo, not warm brown */
      --bg:          #09091e;
      --surface-1:   #0d0d26;
      --surface-2:   #12122e;
      --card-bg:     #0f0f28;

      /* Borders — antique gold hairlines */
      --border-lo:   rgba(155, 128, 72, 0.10);
      --border:      rgba(155, 128, 72, 0.20);
      --border-hi:   rgba(155, 128, 72, 0.42);

      /* Text */
      --text:        #f0e8d4;
      --text-2:      #8b7f6c;
      --text-3:      #3e3628;

      /* Accent palette — Persian tile colors */
      --lapis:       #4f72b5;
      --lapis-glow:  rgba(79, 114, 181, 0.12);
      --gold:        #c49650;
      --gold-dim:    rgba(196, 150, 80, 0.12);
      --turquoise:   #3d9080;

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Vazirmatn', Tahoma, 'Arial Unicode MS', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Site header ────────────────────────────────────────────── */
    .site-header {
      position: relative;
      overflow: hidden;
    }

    /* Lattice background — references the geometric tile tradition */
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79, 114, 181, 0.10) 0%, transparent 70%),
        repeating-linear-gradient(
          60deg,
          transparent 0, transparent 39px,
          rgba(155, 128, 72, 0.05) 39px, rgba(155, 128, 72, 0.05) 40px
        ),
        repeating-linear-gradient(
          -60deg,
          transparent 0, transparent 39px,
          rgba(155, 128, 72, 0.05) 39px, rgba(155, 128, 72, 0.05) 40px
        );
      pointer-events: none;
    }

    .header-inner {
      position: relative;
      z-index: 1;
      padding: 5.5rem 2rem 4.5rem;
      text-align: center;
      max-width: 860px;
      margin: 0 auto;
    }

    .header-eyebrow {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      color: var(--lapis);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      display: block;
      opacity: 0.75;
    }

    /* Primary display: IM Fell English italic — archaeological authority */
    .header-title-en {
      font-family: 'IM Fell English', Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 0.7rem;
    }

    .header-title-fa {
      display: block;
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.04em;
      line-height: 1.3;
      margin-bottom: 1rem;
      opacity: 0.82;
    }

    .header-sub {
      font-size: 0.83rem;
      color: var(--text-2);
      font-weight: 300;
    }

    /* ── Girih tile divider — the page's signature element ──────── */
    /* Interlocking diamond strapwork references Persian geometric
       architecture (Girih tiles, ~1100 CE onward). The pattern marks
       the boundary between museum context and artifact space. */
    .jali-divider {
      position: relative;
      height: 60px;
      overflow: hidden;
    }

    /* ── Gallery grid ───────────────────────────────────────────── */
    #gallery {
      max-width: 1380px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 8rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 272px;
      gap: 1.5rem;
    }

    /* Persepolis anchors the gallery: 2 cols × 2 rows */
    #gallery > .card:first-child {
      grid-column: span 2;
      grid-row: span 2;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background-color: var(--card-bg);
      background-image: repeating-linear-gradient(
        45deg,
        var(--border-lo) 0, var(--border-lo) 1px,
        transparent 1px, transparent 16px
      );
      border: 1px solid var(--border-lo);
      outline: none;
      transition: border-color 0.35s var(--ease);
      animation: cardIn 0.6s var(--ease) both;
    }

    .card:hover,
    .card:focus-visible {
      border-color: var(--border-hi);
    }

    .card:focus-visible {
      outline: 2px solid var(--lapis);
      outline-offset: 3px;
    }

    /* Gold-to-turquoise accent — Persian tile colors, expands from RTL-start */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(to left, var(--gold), var(--turquoise));
      z-index: 4;
      transition: width 0.5s var(--ease);
    }

    .card:hover::before,
    .card:focus-visible::before {
      width: 55%;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.72;
      transition: transform 0.8s var(--ease), opacity 0.5s ease;
    }

    .card:hover .card-img,
    .card:focus-visible .card-img {
      transform: scale(1.065);
      opacity: 0.92;
    }

    .card-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(9, 9, 30, 0.97) 0%,
        rgba(9, 9, 30, 0.52) 38%,
        rgba(9, 9, 30, 0.04) 68%
      );
      z-index: 1;
    }

    .card-body {
      position: absolute;
      bottom: 0;
      right: 0;
      left: 0;
      padding: 1.2rem 1.2rem 1rem;
      z-index: 2;
    }

    .card-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.18em;
      color: var(--lapis);
      margin-bottom: 0.28rem;
      display: block;
      opacity: 0.8;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    .card-latin {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 0.7rem;
      color: var(--gold);
      opacity: 0.55;
      margin-top: 0.14rem;
      display: block;
    }

    .card-place {
      font-size: 0.68rem;
      color: var(--text-2);
      margin-top: 0.18rem;
    }

    /* Feature card: larger body text */
    #gallery > .card:first-child .card-body {
      padding: 1.75rem 1.75rem 1.5rem;
    }

    #gallery > .card:first-child .card-date {
      font-size: 0.64rem;
      margin-bottom: 0.42rem;
    }

    #gallery > .card:first-child .card-name {
      font-size: 1.5rem;
    }

    #gallery > .card:first-child .card-latin {
      font-size: 0.92rem;
      opacity: 0.65;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Detail view ────────────────────────────────────────────── */
    #detail {
      display: none;
      min-height: 100vh;
    }

    #detail.active {
      display: block;
      animation: detailIn 0.4s var(--ease) both;
    }

    @keyframes detailIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Sticky bar */
    .detail-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(9, 9, 30, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.5rem;
      gap: 1rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.78rem;
      padding: 0.42rem 0.95rem;
      cursor: pointer;
      transition: color 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .btn-back:hover {
      border-color: var(--border-hi);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .btn-back:focus-visible {
      outline: 2px solid var(--lapis);
      outline-offset: 2px;
    }

    .btn-back svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    .detail-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      user-select: none;
    }

    /* Hero image */
    .detail-hero {
      position: relative;
      height: min(65vh, 600px);
      overflow: hidden;
      background: var(--surface-1);
    }

    .detail-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    .detail-hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70%;
      background: linear-gradient(to bottom, transparent, var(--bg));
      pointer-events: none;
    }

    /* Content column */
    .detail-content {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 6rem;
    }

    /* Tags */
    .detail-tags {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      padding: 0.2rem 0.6rem;
      border: 1px solid;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .tag-period   { color: var(--lapis);  border-color: rgba(79, 114, 181, 0.28); }
    .tag-location { color: var(--text-2); border-color: var(--border); }
    .tag-date     { color: var(--text-3); border-color: transparent; font-size: 0.55rem; }

    .detail-title {
      font-size: clamp(2rem, 5.5vw, 3.4rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .detail-latin {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--gold);
      opacity: 0.6;
      display: block;
      margin-bottom: 2rem;
    }

    /* Gradient rule — mirrors the card accent line */
    .detail-rule {
      width: 36px;
      height: 2px;
      background: linear-gradient(to left, var(--gold), var(--turquoise));
      opacity: 0.55;
      margin-bottom: 2rem;
    }

    .detail-desc {
      font-size: 0.97rem;
      line-height: 2.1;
      color: var(--text-2);
      font-weight: 300;
    }

    .detail-desc p + p { margin-top: 1.1rem; }

    /* Prev / next */
    .detail-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.78rem;
      padding: 0.48rem 1.05rem;
      cursor: pointer;
      transition: color 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: var(--border-hi);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .btn-nav:focus-visible {
      outline: 2px solid var(--lapis);
      outline-offset: 2px;
    }

    .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
    .btn-nav svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      #gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 250px;
        gap: 1.25rem;
      }
      #gallery > .card:first-child {
        grid-column: span 2;
        grid-row: span 1;
      }
    }

    @media (max-width: 640px) {
      .header-inner { padding: 3.5rem 1.25rem 3rem; }

      #gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 185px;
        padding: 2rem 0.75rem 5rem;
        gap: 0.75rem;
      }

      #gallery > .card:first-child {
        grid-column: span 2;
        grid-row: span 1;
      }

      #gallery > .card:first-child .card-body { padding: 1.2rem 1.2rem 1rem; }
      #gallery > .card:first-child .card-name { font-size: 1.1rem; }
      #gallery > .card:first-child .card-latin { font-size: 0.75rem; }

      .detail-hero { height: min(45vh, 320px); }
      .detail-content { padding: 1.5rem 1rem 4rem; }
      .detail-bar { padding: 0.75rem 1rem; }
    }

    @media (max-width: 400px) {
      #gallery {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
      }
      .card { aspect-ratio: 4 / 3; }
      #gallery > .card:first-child {
        grid-column: span 1;
        grid-row: span 1;
      }
    }

    /* ── Reduced motion ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .card, #detail.active { animation: none; }
      .card-img { transition: opacity 0.3s ease; }
      .card:hover .card-img { transform: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <span class="header-eyebrow">Iran · Cultural Heritage Gallery</span>
    <h1 class="header-title-en">Monuments of Persia</h1>
    <span class="header-title-fa">گالری آثار باستانی ایران</span>
    <p class="header-sub">نگاهی به شکوه تمدن چندهزارساله</p>
  </div>

  <!-- Jali divider: diamond lattice (image 1 — stone jali screen)
       overlaid with repeating beaded oval medallions (image 2). -->
  <div class="jali-divider" aria-hidden="true">
    <svg viewBox="0 0 1440 60" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 14×14 diamond lattice tile (image 1):
             diamond outline + interior cross + node dots at each tip -->
        <pattern id="jali-p" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
          <polygon points="7,0 14,7 7,14 0,7"
            fill="none" stroke="rgba(196,150,80,0.34)" stroke-width="0.75"/>
          <line x1="7" y1="0" x2="7" y2="14"
            stroke="rgba(196,150,80,0.17)" stroke-width="0.5"/>
          <line x1="0" y1="7" x2="14" y2="7"
            stroke="rgba(196,150,80,0.17)" stroke-width="0.5"/>
          <circle cx="7"  cy="7"  r="0.9" fill="rgba(196,150,80,0.34)"/>
          <circle cx="0"  cy="0"  r="0.6" fill="rgba(196,150,80,0.20)"/>
          <circle cx="14" cy="0"  r="0.6" fill="rgba(196,150,80,0.20)"/>
          <circle cx="0"  cy="14" r="0.6" fill="rgba(196,150,80,0.20)"/>
          <circle cx="14" cy="14" r="0.6" fill="rgba(196,150,80,0.20)"/>
        </pattern>
        <!-- 84×60 oval medallion tile (image 2):
             beaded outer ellipse (stroke-dasharray = bead texture),
             inner concentric ellipse, center node, capped tips -->
        <pattern id="oval-p" x="0" y="0" width="84" height="60" patternUnits="userSpaceOnUse">
          <ellipse cx="42" cy="30" rx="24" ry="12"
            fill="rgba(9,9,30,0.58)"
            stroke="rgba(196,150,80,0.56)" stroke-width="1.4"
            stroke-dasharray="2.6,1.8"/>
          <ellipse cx="42" cy="30" rx="15" ry="7"
            fill="none" stroke="rgba(196,150,80,0.26)" stroke-width="0.7"/>
          <circle cx="42" cy="30" r="2.2" fill="rgba(196,150,80,0.64)"/>
          <circle cx="18" cy="30" r="2.6"
            fill="rgba(9,9,30,0.88)" stroke="rgba(196,150,80,0.64)" stroke-width="1.1"/>
          <circle cx="66" cy="30" r="2.6"
            fill="rgba(9,9,30,0.88)" stroke="rgba(196,150,80,0.64)" stroke-width="1.1"/>
        </pattern>
      </defs>
      <line x1="0" y1="1"  x2="1440" y2="1"  stroke="rgba(155,128,72,0.28)" stroke-width="1"/>
      <rect x="0" y="2" width="1440" height="56" fill="url(#jali-p)"/>
      <rect x="0" y="2" width="1440" height="56" fill="url(#oval-p)"/>
      <line x1="0" y1="59" x2="1440" y2="59" stroke="rgba(155,128,72,0.14)" stroke-width="1"/>
    </svg>
  </div>
</header>

<!-- ── Gallery ──────────────────────────────────────────────────── -->
<main id="gallery" role="main" aria-label="فهرست آثار تاریخی ایران"></main>

<!-- ── Detail view ─────────────────────────────────────────────── -->
<section id="detail" role="region" aria-label="جزئیات اثر" aria-hidden="true">

  <nav class="detail-bar" aria-label="ناوبری">
    <button class="btn-back" id="btn-back" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
      </svg>
      بازگشت به گالری
    </button>
    <span class="detail-count" id="detail-count" aria-live="polite"></span>
  </nav>

  <figure class="detail-hero" aria-hidden="true">
    <img id="d-img" class="detail-hero-img" src="" alt="" loading="lazy">
    <div class="detail-hero-fade"></div>
  </figure>

  <div class="detail-content">
    <div class="detail-tags" aria-label="دسته‌بندی">
      <span class="tag tag-period"   id="d-period"></span>
      <span class="tag tag-location" id="d-location"></span>
      <span class="tag tag-date"     id="d-date"></span>
    </div>

    <h2 class="detail-title" id="d-title"></h2>
    <span class="detail-latin" id="d-latin" aria-label="نام لاتین"></span>

    <div class="detail-rule" aria-hidden="true"></div>

    <div class="detail-desc" id="d-desc"></div>

    <div class="detail-nav">
      <!-- In RTL flex: btn-prev renders on the right, btn-next on the left -->
      <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" aria-label="اثر قبلی">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
        قبلی
      </button>
      <button class="btn-nav" id="btn-next" onclick="navigate(1)" aria-label="اثر بعدی">
        بعدی
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </button>
    </div>
  </div>
</section>

<script>
/* ── Monument data ──────────────────────────────────────────────── */
const MONUMENTS = [
  {
    name:     "تخت جمشید",
    latin:    "Persepolis",
    period:   "هخامنشی",
    location: "مرودشت، فارس",
    date:     "c. 520–330 BCE",
    img:      "https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Persepolis_stairs_of_the_Apadana_relief.jpg/1280px-Persepolis_stairs_of_the_Apadana_relief.jpg",
    desc:     `تخت جمشید، پایتخت تشریفاتی امپراتوری هخامنشی، از بزرگ‌ترین مجموعه‌های معماری باستانی جهان است. داریوش اول ساخت آن را در حدود ۵۲۰ پیش از میلاد آغاز کرد و جانشینانش خشایارشا و اردشیر اول آن را به اتمام رساندند.

کاخ‌های آپادانا، صد ستون و تچر با نقش‌برجسته‌هایی که هیئت‌های نمایندگی ملل گوناگون را در حال تقدیم هدیه نشان می‌دهند، از ارزشمندترین منابع تصویری تاریخ هنر ایران باستانند. یونسکو تخت جمشید را در ۱۹۷۹ در فهرست میراث جهانی ثبت کرد.`
  },

/* ── Helpers ────────────────────────────────────────────────────── */
function toPersian(n) {
  return String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}

function toHTML(text) {
  return text.trim().split(/\n\n+/).map(p => `<p>${p.trim()}</p>`).join('');
}

/* ── State ──────────────────────────────────────────────────────── */
let current      = -1;
let savedScrollY = 0;
let lastCard     = null;

/* ── Build gallery ──────────────────────────────────────────────── */
(function build() {
  const gallery = document.getElementById('gallery');

  gallery.innerHTML = MONUMENTS.map((m, i) => `
    <article
      class="card"
      tabindex="0"
      role="button"
      aria-label="${m.name}، ${m.location}"
      data-index="${i}"
      style="animation-delay: ${i * 0.05}s"
    >
      <img
        class="card-img"
        src="${m.img}"
        alt="${m.name}"
        loading="lazy"
        onerror="this.style.opacity='0'"
      >
      <div class="card-shade" aria-hidden="true"></div>
      <div class="card-body">
        <span class="card-date">${m.date}</span>
        <div class="card-name">${m.name}</div>
        <span class="card-latin">${m.latin}</span>
        <div class="card-place">${m.location}</div>
      </div>
    </article>
  `).join('');

  gallery.addEventListener('click', e => {
    const card = e.target.closest('[data-index]');
    if (card) { lastCard = card; openDetail(+card.dataset.index); }
  });

  gallery.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('[data-index]');
    if (card) { e.preventDefault(); lastCard = card; openDetail(+card.dataset.index); }
  });
})();

/* ── Open detail ────────────────────────────────────────────────── */
function openDetail(idx) {
  current      = idx;
  savedScrollY = window.scrollY;
  const m      = MONUMENTS[idx];

  document.getElementById('d-img').src                = m.img;
  document.getElementById('d-img').alt                = m.name;
  document.getElementById('d-title').textContent      = m.name;
  document.getElementById('d-latin').textContent      = m.latin;
  document.getElementById('d-period').textContent     = m.period;
  document.getElementById('d-location').textContent   = m.location;
  document.getElementById('d-date').textContent       = m.date;
  document.getElementById('detail-count').textContent =
    `${toPersian(idx + 1)} از ${toPersian(MONUMENTS.length)}`;
  document.getElementById('d-desc').innerHTML         = toHTML(m.desc);

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === MONUMENTS.length - 1;

  const gallery = document.getElementById('gallery');
  const detail  = document.getElementById('detail');

  gallery.style.display = 'none';
  gallery.setAttribute('aria-hidden', 'true');

  detail.classList.add('active');
  detail.removeAttribute('aria-hidden');

  window.scrollTo({ top: 0, behavior: 'instant' });
  document.getElementById('btn-back').focus();
}

/* ── Close detail ───────────────────────────────────────────────── */
function closeDetail() {
  const gallery = document.getElementById('gallery');
  const detail  = document.getElementById('detail');

  detail.classList.remove('active');
  detail.setAttribute('aria-hidden', 'true');

  gallery.style.display = '';
  gallery.removeAttribute('aria-hidden');

  window.scrollTo({ top: savedScrollY, behavior: 'instant' });
  if (lastCard) lastCard.focus();
}

/* ── Navigate prev / next ───────────────────────────────────────── */
function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < MONUMENTS.length) openDetail(next);
}

/* ── Keyboard shortcuts ─────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (!document.getElementById('detail').classList.contains('active')) return;
  if (e.key === 'Escape')     closeDetail();
  if (e.key === 'ArrowLeft')  navigate(1);   // RTL: left = next in sequence
  if (e.key === 'ArrowRight') navigate(-1);  // RTL: right = previous
});
</script>
